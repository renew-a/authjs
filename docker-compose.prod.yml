version: '3.9'

services:

  api:
    container_name: authjs_api

    build:
      context: .
      dockerfile: Dockerfile

    restart: always

    ports:
      - '3000:3000'

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

    command: yarn start:prod

  postgres:
    image: postgres:16

    container_name: authjs_postgres

    restart: always

    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

    container_name: authjs_redis

    restart: always

volumes:
  postgres_data:
