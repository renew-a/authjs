version: '3.9'

services:

  api:
    container_name: authjs_api

    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - '3000:3000'

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules

    command: yarn start:dev

  postgres:
    image: postgres:16

    container_name: authjs_postgres

    restart: always

    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}

    ports:
      - '5432:5432'

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

    container_name: authjs_redis

    ports:
      - '6379:6379'

volumes:
  postgres_data:
